<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз по истории России</title>
<meta name="description" content="Интерактивный квиз для подготовки к экзамену по истории России: Древняя Русь, Российская империя, СССР. 234 вопроса с разбором тем.">
<meta name="theme-color" content="#0f1419">
<meta name="author" content="">
<!-- Open Graph (красивая ссылка в мессенджерах/соцсетях) -->
<meta property="og:type" content="website">
<meta property="og:title" content="📜 Квиз по истории России">
<meta property="og:description" content="234 вопроса для подготовки к экзамену: Древняя Русь, Империя, СССР. Ошибся — тема раскроется.">
<meta property="og:locale" content="ru_RU">
<meta name="twitter:card" content="summary">
<!-- Иконка во вкладке (эмодзи-свиток, без отдельного файла) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>📜 Квиз по истории России</h1>
    <p>Древняя Русь · Империя · СССР. Ошибся — тема раскроется.</p>
  </header>

  <!-- ПРОФИЛЬ (имя из куки) -->
  <div id="profile" class="profile hidden">
    <span class="avatar">?</span>
    <span class="who"><span class="hi">Привет,</span><span class="nm"></span></span>
    <button class="edit" onclick="openNamePrompt(true)">Сменить имя</button>
  </div>

  <!-- МЕНЮ -->
  <div id="menu" class="card"></div>

  <!-- КВИЗ -->
  <div id="quiz" class="card hidden">
    <div class="quiz-head">
      <button class="back" onclick="goMenu()">← Темы</button>
      <span class="quiz-topic" id="quizTopic"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="progressText"></span>
        <span id="scoreText"></span>
      </div>
    </div>
    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain">
      <div class="tag" id="explainTag"></div>
      <div class="reveal-title" id="revealTitle"></div>
      <p id="explainText"></p>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Далее →</button>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div id="result" class="card result hidden"></div>

  <!-- СТАТИСТИКА -->
  <div id="stats" class="card hidden"></div>

  <!-- ЛИДЕРБОРД -->
  <div id="leaderboard" class="card hidden"></div>

  <footer class="foot">Тренажёр для подготовки к экзамену · <span id="qcount"></span> вопросов</footer>
</div>

<!-- Модалка ввода имени -->
<div id="nameModal" class="modal-overlay">
  <div class="modal">
    <h3>Как тебя зовут?</h3>
    <p>Имя нужно для рейтинга и сохранения статистики. Введи один раз — мы запомним тебя на этом устройстве.</p>
    <input id="nameInput" type="text" maxlength="40" placeholder="Например: Иван П." onkeydown="if(event.key==='Enter')saveName()">
    <div class="modal-actions">
      <button id="nameCancel" class="cancel" onclick="closeNamePrompt()">Отмена</button>
      <button class="save" onclick="saveName()">Сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="assets/js/questions.js"></script>
<script src="assets/js/identity.js"></script>
<script src="assets/js/stats.js"></script>
<script src="assets/js/leaderboard.js"></script>
<script src="assets/js/quiz.js"></script>
</body>
</html>
